# 使用知识库名称的配置示例
# 程序会自动查询并转换为对应的 space_id

pipelines:
  # 方式 1: 使用知识库名称（推荐）
  - name: demo-by-name
    source:
      dingtalk:
        space: "平台产品知识库"  # 程序自动查询对应的 space_id
        folders: ["产品规划物料"]
        include_types: [DOCUMENT, ALIDOC]
    destination:
      localdrive:
        output_dir: ./output/by-name
    steps: []

  # 方式 2: 直接使用 space_id（传统方式）
  - name: demo-by-id
    source:
      dingtalk:
        space_id: "nb9XJB7qpnkxQXyA"  # 直接使用 ID
        folders: ["产品规划物料"]
        include_types: [DOCUMENT, ALIDOC]
    destination:
      localdrive:
        output_dir: ./output/by-id
    steps: []

  # 方式 3: 模糊匹配（可以使用部分名称）
  - name: demo-fuzzy
    source:
      dingtalk:
        space: "平台产品"  # 会匹配 "平台产品知识库"
        include_types: [DOCUMENT, ALIDOC]
    destination:
      localdrive:
        output_dir: ./output/fuzzy
    steps: []
