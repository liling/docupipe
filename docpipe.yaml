hindsight:
  api_url: ${HINDSIGHT_API_URL}
  api_key: ${HINDSIGHT_API_KEY}
  bank_id: ${HINDSIGHT_BANK_ID}

image_description:
  api_key: ${IMAGE_API_KEY}
  base_url: ${IMAGE_BASE_URL}
  model: ${IMAGE_MODEL:-qwen3.5-flash}

converters:
  extensions:
    ".pdf": mineru
    ".docx": mineru
    ".pptx": mineru
    ".xlsx": mineru
    ".doc": mineru
    ".xls": mineru
    ".ppt": mineru

pipelines:

  - name: shujuxian-to-hindsight
    source:
      dingtalk:
        space_id: nb9XJB7qpnkxQXyA
        folders: ["产品规划物料/解决方案"]
        include_types: [DOCUMENT, ALIDOC]
    destination:
      hindsight:
        context_prefix: "数据线知识库文档"
    steps:
      - convert
      - image_description
    options:
      resume: true
      sync: true

  - name: shujuxian-to-local
    source:
      dingtalk:
        space_id: nb9XJB7qpnkxQXyA
        folders: ["产品规划物料/解决方案"]
        include_types: [DOCUMENT, ALIDOC]
    destination:
      localdrive:
        output_dir: ./output
    steps:
      - convert
      - image_description

  - name: local-to-hindsight
    source:
      localdrive:
        input_dir: ./output
        include: ["*.md"]
    destination:
      hindsight:
        context_prefix: "本地文档"
    steps:
      - convert
