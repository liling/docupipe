hindsight:
  api_url: http://localhost:8888
  bank_id: docpipe

image_description:
  api_key: ${WISEDU_API_KEY}
  base_url: http://172.16.4.197:8002/v1
  model: ${IMAGE_MODEL:-qwen3.5-flash}

converters:
  extensions:
    ".pdf": mineru
    ".docx": markitdown
    ".pptx": markitdown
    ".xlsx": markitdown
    ".doc": markitdown
    ".xls": markitdown
    ".ppt": markitdown

s3_upload:
  endpoint_url: ${S3_ENDPOINT:-http://localhost:9000}
  region: ${S3_REGION:-us-east-1}
  bucket: ${S3_BUCKET:-hindsight}
  access_key: rustfsadmin
  secret_key: rustfsadmin
  prefix: attachments
  url_prefix: ${S3_URL_PREFIX:-http://localhost:9000}
  roles: ["image"]

pipelines:

  # 阶段 1: 钉钉 → localdrive（只下载不转换）
  - name: dingtalk-download
    source:
      dingtalk:
        space: 平台产品知识库
        # folders: ["产品规划物料"]
        include_types: [DOCUMENT, ALIDOC]
    destination:
      localdrive:
        output_dir: ./output/dingtalk
    steps: []

  # 阶段 2: localdrive → localdrive（转换为 markdown + 描述图片）
  - name: dingtalk-convert
    source:
      localdrive:
        input_dir: ./output/dingtalk
        include: ["*.docx", "*.pptx", "*.xlsx", "*.pdf", "*.md"]
    destination:
      localdrive:
        output_dir: ./output/markdown
    steps:
      - convert
      # - image_description

  # 阶段 3: localdrive → hindsight（上传附件到 S3，再推送到 Hindsight）
  - name: markdown-to-hindsight
    source:
      localdrive:
        input_dir: ./output/markdown/平台产品知识库/产品规划物料/解决方案
        include: ["*.md"]
    destination:
      hindsight:
        context_prefix: "平台产品知识库"
    steps:
      - resolve_attachments
      - s3_upload
