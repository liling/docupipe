hindsight:
  api_url: http://localhost:8888
  bank_id: docpipe

image_description:
  api_key: ${WISEDU_API_KEY}
  base_url: http://172.16.4.197:8002/v1
  model: ${IMAGE_MODEL:-qwen3.5-flash}

converters:
  extensions:
    ".pdf": mineru
    ".docx": markitdown
    ".pptx": mineru
    ".xlsx": mineru
    ".doc": mineru
    ".xls": mineru
    ".ppt": mineru

pipelines:

  # 阶段 1: 钉钉 → localdrive（只下载不转换）
  - name: dingtalk-download
    source:
      dingtalk:
        space_id: nb9XJB7qpnkxQXyA
        # folders: ["产品规划物料"]
        include_types: [DOCUMENT, ALIDOC]
    destination:
      localdrive:
        output_dir: ./output/dingtalk
    steps: []

  # 阶段 2: localdrive → localdrive（转换为 markdown + 描述图片）
  - name: dingtalk-convert
    source:
      localdrive:
        input_dir: ./output/dingtalk
        include: ["*.docx"]
    destination:
      localdrive:
        output_dir: ./output/markdown
    steps:
      - convert
      - image_description

  # 阶段 3: localdrive → hindsight（*.md 直接 retain）
  - name: markdown-to-hindsight
    source:
      localdrive:
        input_dir: ./output/markdown
        include: ["*.md"]
    destination:
      hindsight:
        context_prefix: "数据线知识库文档"
    steps: []
