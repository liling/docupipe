# 全局默认配置（pipeline 级配置会覆盖全局级）
hindsight:
  api_url: ${HINDSIGHT_API_URL}
  api_key: ${HINDSIGHT_API_KEY}
  bank_id: ${HINDSIGHT_BANK_ID}

image_description:
  api_key: ${IMAGE_DESCRIPTION_API_KEY}
  base_url: ${IMAGE_DESCRIPTION_BASE_URL}
  model: ${IMAGE_DESCRIPTION_MODEL:-gpt-4o}

converters:
  extensions:
    ".pdf": mineru
    ".doc": markitdown
    ".docx": markitdown
    ".ppt": markitdown
    ".pptx": markitdown
    ".xls": markitdown
    ".xlsx": markitdown

pipelines:

  # 快速开始：本地文件直接拷贝，无需外部依赖
  - name: quick-start
    source:
      localdrive:
        input_dir: ./input
        include: ["*.md"]
    destination:
      localdrive:
        output_dir: ./output
    steps: []

  # 场景 1：从钉钉知识库下载文档到本地
  - name: dingtalk-download
    source:
      dingtalk:
        space: "产品知识库"          # 支持知识库名称（自动查询 ID）
        # space_id: "kfiwoue83nkxQXyA"  # 或直接使用 space_id
        folders: ["产品规划物料"]
        include_types: [DOCUMENT, ALIDOC]
    destination:
      localdrive:
        output_dir: ./output/dingtalk
    steps: []

  # 场景 2：本地文档格式转换
  - name: convert-docs
    source:
      localdrive:
        input_dir: ./output/dingtalk
        include: ["*.docx"]
    destination:
      localdrive:
        output_dir: ./output/markdown
    steps:
      - convert
      - image_description

  # 场景 3：本地文档写入 HindSight Memory
  - name: to-hindsight
    source:
      localdrive:
        input_dir: ./output/markdown
        include: ["*.md"]
    destination:
      hindsight:
        context_prefix: "产品知识库"
        # 可选高级配置（支持 {{ xxx }} Jinja2 模板）
        # document_id_template: "{{ space_name }}/{{ path }}"
        # context_template: "来自{{ space_name }}的{{ title }}"
        # extra_tags:
        #   - "custom:{{ space_name }}"
        # extra_metadata:
        #   author: "{{ author | default('unknown') }}"
    steps: []

  # 场景 4：钉钉知识库 → HindSight Memory（ALL IN ONE）
  - name: full-pipeline
    source:
      dingtalk:
        space: "产品知识库"
    destination:
      hindsight:
        context_prefix: "知识库"
    steps:
      - convert
      - image_description
